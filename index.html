<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drivik VPN</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        body {
            background-color: #121214;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            padding-bottom: 80px; /* Отступ для нижнего меню */
        }
        
        /* Шапка с градиентом */
        .header {
            background: linear-gradient(135deg, #a100ff, #5000aa);
            padding: 30px 20px 40px;
            text-align: center;
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
            box-shadow: 0 4px 15px rgba(161, 0, 255, 0.3);
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: #333;
            margin: 0 auto 10px;
            border: 3px solid rgba(255,255,255,0.2);
            object-fit: cover;
        }

        .user-name {
            font-size: 24px;
            font-weight: 800;
            margin: 0;
        }
        
        .user-id {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            margin-top: 5px;
        }

        /* Карточка подписки */
        .card {
            background-color: #1e1e22;
            border-radius: 20px;
            padding: 20px;
            margin: -20px 15px 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            position: relative;
        }

        .card-title {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .plan-name {
            font-size: 22px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 15px;
        }

        /* Кнопки и сетка */
        .btn {
            background: linear-gradient(90deg, #b14bf4, #8b22e2);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            width: 100%;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        .grid-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 0 15px;
        }

        .action-box {
            border-radius: 18px;
            padding: 20px 15px;
            color: white;
            font-weight: 600;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 80px;
        }

        .box-purple { background: linear-gradient(135deg, #8e2de2, #4a00e0); }
        .box-pink { background: linear-gradient(135deg, #ff416c, #ff4b2b); }
        .box-orange { background: linear-gradient(135deg, #f7971e, #ffd200); }
        
        .box-title { font-size: 16px; margin-bottom: 5px; }
        .box-subtitle { font-size: 11px; opacity: 0.8; font-weight: 400; }

        /* Нижнее меню (TabBar) */
        .tab-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background-color: #1c1c1e;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid #333;
            z-index: 100;
        }

        .tab-item {
            color: #888;
            text-align: center;
            font-size: 12px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .tab-item.active {
            color: #b14bf4;
        }

        .tab-icon {
            font-size: 20px;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

    <div class="header">
        <img id="user-photo" class="avatar" src="https://via.placeholder.com/80" alt="Avatar">
        <p class="user-name" id="user-name">Загрузка...</p>
        <p class="user-id" id="user-id">ID: ...</p>
    </div>

    <div class="card">
        <div class="card-title">Ваша подписка</div>
        <div class="plan-name">VPN Стандарт</div>
        
        <div style="font-size: 14px; margin-bottom: 10px;">
            Статус: <span style="color: #4cd964;">Активна</span>
        </div>
        
        <div style="background: #333; border-radius: 10px; height: 8px; margin-bottom: 10px; overflow: hidden;">
            <div style="background: #b14bf4; width: 70%; height: 100%;"></div>
        </div>
        <div style="font-size: 12px; color: #888; margin-bottom: 15px;">Осталось 20 дней</div>

        <button class="btn" onclick="tg.close()">Закрыть приложение</button>
    </div>

    <h3 style="padding: 0 15px; font-size: 16px;">⚡ Быстрые действия</h3>
    
    <div class="grid-actions">
        <div class="action-box box-purple">
            <div class="box-title">📖 Инструкция</div>
            <div class="box-subtitle">Как подключиться</div>
        </div>
        
        <a href="https://t.me/oomab" class="action-box box-pink">
            <div class="box-title">💬 Поддержка</div>
            <div class="box-subtitle">Помощь 24/7</div>
        </a>

        <div class="action-box box-orange">
            <div class="box-title">👤 Мой профиль</div>
            <div class="box-subtitle">Настройки аккаунта</div>
        </div>
    </div>

    <div class="tab-bar">
        <a href="#" class="tab-item active">
            <span class="tab-icon">🏠</span>
            Главная
        </a>
        <a href="#" class="tab-item">
            <span class="tab-icon">🛒</span>
            Купить
        </a>
        <a href="#" class="tab-item">
            <span class="tab-icon">🔑</span>
            Подписка
        </a>
        <a href="#" class="tab-item">
            <span class="tab-icon">📱</span>
            Устройства
        </a>
    </div>

    <script>
        // Инициализируем Telegram Web App
        let tg = window.Telegram.WebApp;
        
        // Расширяем приложение на весь экран
        tg.expand();
        
        // Сообщаем телеграму, что приложение готово к показу
        tg.ready();

        // Вытаскиваем данные пользователя, который открыл приложение
        let user = tg.initDataUnsafe.user;

        if (user) {
            // Подставляем имя и ID
            document.getElementById('user-name').innerText = user.first_name + (user.last_name ? ' ' + user.last_name : '');
            document.getElementById('user-id').innerText = 'ID: ' + user.id;
            
            // Если у пользователя есть аватарка, ставим её
            if (user.photo_url) {
                document.getElementById('user-photo').src = user.photo_url;
            }
        } else {
            document.getElementById('user-name').innerText = 'Гость';
        }
    </script>
</body>
</html>
