<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drivik VPN</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #1c1c1d);
            color: var(--tg-theme-text-color, #ffffff);
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        h1 {
            color: #3390ec;
            margin-bottom: 5px;
        }
        p {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #9e9e9e);
            margin-bottom: 30px;
        }
        .tariff-card {
            background-color: var(--tg-theme-secondary-bg-color, #2c2c2e);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #3c3c3e;
            transition: transform 0.1s;
        }
        .tariff-card:active {
            transform: scale(0.98);
        }
        .price {
            font-size: 20px;
            font-weight: bold;
            color: #3390ec;
        }
        button {
            background-color: #3390ec;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            width: 100%;
            font-size: 16px;
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>🚀 Drivik VPN</h1>
    <p>Выбери тариф для безопасного интернета</p>

    <div class="tariff-card">
        <h3>1 Месяц</h3>
        <div class="price">150 ₽</div>
        <button onclick="order(1)">Выбрать</button>
    </div>

    <div class="tariff-card">
        <h3>6 Месяцев</h3>
        <div class="price">800 ₽</div>
        <button onclick="order(6)">Выбрать</button>
    </div>

    <script>
        // Инициализируем приложение Telegram
        let tg = window.Telegram.WebApp;
        tg.expand(); // Открываем на весь экран

        // Функция при нажатии на кнопку тарифа
        function order(months) {
            // Отправляем данные обратно в бота
            tg.sendData(months.toString());
        }
    </script>

</body>
</html>
