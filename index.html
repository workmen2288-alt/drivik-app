<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drivik VPN</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { background-color: #121214; color: #ffffff; font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 90px; }
        
        /* Стили блоков */
        .page { display: none; }
        .page.active { display: block; }
        
        /* Твой дизайн (оставляем старые стили для красоты) */
        .header { display: flex; align-items: center; justify-content: space-between; padding: 20px; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
        .sub-card { background: linear-gradient(135deg, #a100ff, #5000aa); border-radius: 20px; padding: 20px; margin: 0 15px 20px; }
        .btn-renew { background: rgba(255,255,255,0.15); width: 100%; padding: 12px; border-radius: 12px; color: #fff; border: none; font-weight: 600; }
        
        /* Нижнее меню */
        .tab-bar { position: fixed; bottom: 0; width: 100%; background-color: #1c1c1e; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; }
        .tab-item { color: #888; text-align: center; font-size: 12px; cursor: pointer; }
        .tab-item.active { color: #b14bf4; }
    </style>
</head>
<body>

    <div id="home" class="page active">
        <div class="header">
            <div style="display:flex; align-items:center; gap:15px;">
                <img id="user-photo" class="avatar" src="https://via.placeholder.com/50">
                <div><p style="font-size:14px;color:#888;">Привет,</p><p id="user-name" style="font-size:20px;font-weight:800;"></p></div>
            </div>
        </div>
        <div class="sub-card">
            <div id="sub-plan" style="font-size:22px; font-weight:800;">Загрузка...</div>
            <div id="sub-days" style="margin-top:10px;">Осталось 0 дней</div>
            <button class="btn-renew" style="margin-top:15px;" onclick="tg.close()">Продлить подписку</button>
        </div>
    </div>

    <div id="profile" class="page">
        <h2 style="padding:20px;">Мой профиль</h2>
        <div style="padding:20px; background:#1e1e22; margin:0 15px; border-radius:15px;">
            <p>Telegram ID: <span id="uid"></span></p>
            <p>Статус: <span id="status"></span></p>
        </div>
    </div>

    <div id="devices" class="page">
        <h2 style="padding:20px;">Устройства</h2>
        <button class="btn-renew" style="background:#ff3b30; margin: 0 15px; width:90%;" onclick="resetKey()">🔄 Сбросить ключ</button>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" onclick="showPage('home', this)">🏠 Главная</div>
        <div class="tab-item" onclick="showPage('profile', this)">👤 Профиль</div>
        <div class="tab-item" onclick="showPage('devices', this)">📱 Устройства</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        function showPage(pageId, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            element.classList.add('active');
        }

        // Заполняем данными
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById('user-name').innerText = tg.initDataUnsafe.user.first_name + '!';
        document.getElementById('uid').innerText = tg.initDataUnsafe.user.id;
        document.getElementById('sub-plan').innerText = urlParams.get('plan');
        document.getElementById('sub-days').innerText = 'Осталось ' + urlParams.get('days') + ' дней';
        document.getElementById('status').innerText = urlParams.get('status');

        function resetKey() {
            // Отправляем сигнал боту
            tg.sendData(JSON.stringify({action: "reset_key"}));
        }
    </script>
</body>
</html>
